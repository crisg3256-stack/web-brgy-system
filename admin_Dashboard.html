<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Overview</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter, system-ui, sans-serif;background:#f4f6fc;color:#0f172a;font-size:14px}
    .layout{display:flex;min-height:100vh}
    .sidebar{width:250px;background:#fff;border-right:1px solid #e2e8f0;position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column}
    .brand{height:82px;display:flex;align-items:center;gap:14px;padding:0 24px;border-bottom:1px solid #e2e8f0}
    .brand-icon{width:44px;height:44px;border-radius:50%;background:#2563ff;color:#fff;display:grid;place-items:center;font-size:20px}
    .brand strong{font-size:15px;display:block}
    .brand small{font-size:11px;color:#475569}
    .side-menu{padding:24px 16px;flex:1}
    .side-link{display:flex;align-items:center;gap:14px;height:48px;padding:0 16px;color:#334155;text-decoration:none;border-radius:12px;margin-bottom:10px;font-weight:600;transition:.2s}
    .side-link i{font-size:18px;color:#475569}
    .side-link.active{background:#eef4ff;color:#1d4ed8;box-shadow: inset 0 0 0 1px rgba(59,130,246,.15)}
    .side-link.active i,.side-link:hover i{color:#1d4ed8}
    .side-link:hover{color:#1d4ed8}
    .sidebar-footer{border-top:1px solid #e2e8f0;padding:20px 16px 18px}
    .user-box{display:flex;align-items:center;gap:12px;margin:0 8px 12px}
    .user-avatar{width:36px;height:36px;border-radius:50%;background:#dbeafe;display:grid;place-items:center;color:#2563ff;font-size:18px}
    .user-box strong{display:block;font-size:13px}
    .user-box small{color:#64748b;font-size:11px}
    .logout-side{background:#dc2626;color:#fff;border:0;border-radius:12px;font-weight:700;height:44px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
    .logout-side:hover{opacity:.9}
    .logout-side{width:100%}
    .main{margin-left:250px;width:calc(100% - 250px)}
    .topbar{height:72px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 30px;box-shadow:0 8px 24px rgba(15,23,42,.06);position:sticky;top:0;z-index:10}
    .topbar h1{font-size:18px;font-weight:700;margin:0}
    .content{padding:32px 38px 24px}
    .page-title{margin-bottom:28px}
    .page-title h2{font-size:32px;font-weight:800;margin:0 0 10px;letter-spacing:-.03em}
    .page-title p{font-size:15px;color:#475569;margin:0}
    .page-action{display:flex;align-items:center;gap:10px;margin-bottom:24px}
    .page-action a{color:#2563ff;font-weight:600;text-decoration:none}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;margin-bottom:28px}
    .stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;min-height:118px;padding:24px 26px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 10px 30px rgba(15,23,42,.06)}
    .stat-label{color:#475569;font-size:13px;margin-bottom:10px}
    .stat-value{font-size:32px;font-weight:800;line-height:1}
    .stat-icon{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;font-size:20px}
    .ico-blue{background:#eff6ff;color:#2563ff}
    .ico-yellow{background:#fffbeb;color:#d97706}
    .ico-green{background:#ecfdf5;color:#059669}
    .ico-purple{background:#f3e8ff;color:#7c3aed}
    .panel{background:#fff;border:1px solid #e5e7eb;border-radius:18px;box-shadow:0 10px 30px rgba(15,23,42,.06)}
    .panel-header{display:flex;align-items:center;justify-content:space-between;padding:24px 28px;border-bottom:1px solid #f8fafc}
    .panel-body{padding:24px 28px}
    .panel-body h5{font-size:17px;font-weight:700;margin:0 0 20px}
    .form-select,.form-control{height:46px;border:1px solid #cbd5e1;border-radius:14px}
    .btn-primary{min-width:180px}
    .table{margin:0}
    .table th{font-size:13px;padding:20px 22px;background:#f8fafc}
    .table td{font-size:13px;padding:20px 22px;vertical-align:middle}
    .link-blue{color:#2563ff;text-decoration:none;font-weight:700}
    .badge-soft{border-radius:999px;padding:8px 14px;font-weight:700;font-size:12px}
    .pending{background:#fef3c7;color:#92400e}
    .processing{background:#e0f2fe;color:#0369a1}
    .ready{background:#dcfce7;color:#166534}
    .empty-row{text-align:center;color:#64748b;padding:24px!important}
    .progress-line{height:10px;background:#e2e8f0;border-radius:999px;margin-top:10px}
    .progress-bar{height:10px;background:#2563ff;border-radius:999px}
    @media(max-width:1100px){.stats{grid-template-columns:1fr 1fr}.search-filter{grid-template-columns:1fr}.sidebar{position:static;width:100%}.layout{display:block}.main{margin-left:0;width:100%}.content{padding:24px 20px 20px}}
    @media(max-width:800px){.stats{grid-template-columns:1fr}.topbar{padding:0 20px}.content{padding:20px 18px 20px}}
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand"><div class="brand-icon"><i class="bi bi-building"></i></div><div><strong>Admin Panel</strong><small>Barangay Portal</small></div></div>
    <nav class="side-menu">
      <a href="admin_Dashboard.html" class="side-link active"><i class="bi bi-house-door"></i>Dashboard</a>
      <a href="admin_request.html" class="side-link"><i class="bi bi-file-earmark-text"></i>Requests</a>
      <a href="admin_reports_analytics.html" class="side-link"><i class="bi bi-clipboard-data"></i>Reports</a>
    </nav>
    <div class="sidebar-footer"><div class="user-box"><div class="user-avatar"><i class="bi bi-person"></i></div><div><strong id="adminName"></strong><small id="adminStatus">Administrator</small></div></div><a href="brgy_login.html" class="logout-side text-decoration-none"><i class="bi bi-box-arrow-right"></i>Logout</a></div>
  </aside>

  <main class="main">
    <header class="topbar"><h1>Barangay Management System</h1></header>
    <section class="content">
      <div class="page-title"><h2>Dashboard Overview</h2><p>Manage and track all certificate requests</p></div>
      <div class="stats">
        <div class="stat-card"><div><div class="stat-label">Total Requests</div><div class="stat-value" id="totalRequests"></div></div><div class="stat-icon ico-blue"><i class="bi bi-file-earmark-text"></i></div></div>
        <div class="stat-card"><div><div class="stat-label">Pending</div><div class="stat-value" id="pendingRequests"></div></div><div class="stat-icon ico-yellow"><i class="bi bi-clock"></i></div></div>
        <div class="stat-card"><div><div class="stat-label">Processing</div><div class="stat-value" id="processingRequests"></div></div><div class="stat-icon ico-blue"><i class="bi bi-arrow-clockwise"></i></div></div>
        <div class="stat-card"><div><div class="stat-label">Ready</div><div class="stat-value" id="readyRequests"></div></div><div class="stat-icon ico-green"><i class="bi bi-check-circle"></i></div></div>
      </div>
      <div class="panel">
        <div class="search-filter">
          <input id="searchInput" class="form-control" placeholder="Search by name or request ID...">
          <select id="statusFilter" class="form-select"><option value="">All Status</option></select>
        </div>
        <table class="table"><thead><tr><th>Request ID</th><th>Name</th><th>Certificate Type</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody id="requestsTable"></tbody></table>
      </div>
    </section>
  </main>
</div>

<script>
  const API_URL = '/api/admin/dashboard/';
  const state = { requests: [] };

  function text(id, value){ document.getElementById(id).textContent = value ?? ''; }
  function statusClass(status){ return String(status || '').toLowerCase().replace(/\s+/g,'-'); }

  async function loadDashboard(){
    const response = await fetch(API_URL);
    const data = await response.json();

    text('adminName', data.admin?.name);
    text('adminStatus', data.admin?.role || data.admin?.status || 'Administrator');
    text('totalRequests', data.stats?.total_requests);
    text('pendingRequests', data.stats?.pending);
    text('processingRequests', data.stats?.processing);
    text('readyRequests', data.stats?.ready);

    state.requests = data.requests || [];
    renderStatusOptions(data.status_choices || []);
    renderRequests();
  }

  function renderStatusOptions(statuses){
    const select = document.getElementById('statusFilter');
    statuses.forEach(item => {
      const option = document.createElement('option');
      option.value = item.value;
      option.textContent = item.label;
      select.appendChild(option);
    });
  }

  function renderRequests(){
    const search = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('statusFilter').value;
    const tbody = document.getElementById('requestsTable');
    tbody.innerHTML = '';

    const filtered = state.requests.filter(item => {
      const matchesSearch = `${item.request_id} ${item.name}`.toLowerCase().includes(search);
      const matchesStatus = !status || item.status === status;
      return matchesSearch && matchesStatus;
    });

    if(!filtered.length){
      tbody.innerHTML = '<tr><td colspan="6" class="empty-row">No certificate requests found.</td></tr>';
      return;
    }

    filtered.forEach(item => {
      tbody.insertAdjacentHTML('beforeend', `
        <tr>
          <td><a href="request_details.html?id=${encodeURIComponent(item.id)}" class="link-blue">${item.request_id}</a></td>
          <td>${item.name}</td>
          <td>${item.certificate_type}</td>
          <td><span class="badge-soft ${statusClass(item.status)}">${item.status_label}</span></td>
          <td>${item.date}</td>
          <td><a href="request_details.html?id=${encodeURIComponent(item.id)}" class="link-blue">View Details</a></td>
        </tr>
      `);
    });
  }

  document.getElementById('searchInput').addEventListener('input', renderRequests);
  document.getElementById('statusFilter').addEventListener('change', renderRequests);
  loadDashboard();
</script>
</body>
</html>
