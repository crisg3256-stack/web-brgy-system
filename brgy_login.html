<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f5f7;
      color: #071225;
      font-family: Arial, Helvetica, sans-serif;
    }

    .login-page {
      min-height: calc(100vh - 98px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 42px 16px 44px;
    }

    .lock-icon {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: #2463ff;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin-bottom: 17px;
    }

    .page-title {
      text-align: center;
      margin-bottom: 30px;
    }

    .page-title h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .page-title p {
      margin: 0;
      font-size: 14px;
      color: #334155;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 12px 25px rgba(15, 23, 42, 0.13);
      padding: 30px;
    }

    .form-label {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 9px;
      color: #020617;
    }

    .form-control {
      height: 47px;
      border: 1px solid #c3cedd;
      border-radius: 9px;
      padding: 12px 15px;
      font-size: 14px;
      color: #334155;
    }

    .form-control::placeholder {
      color: #7b8797;
    }

    .form-control:focus {
      border-color: #2463ff;
      box-shadow: 0 0 0 0.16rem rgba(36, 99, 255, 0.15);
    }

    .field-space {
      margin-bottom: 25px;
    }

    .login-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 4px 0 22px;
      font-size: 14px;
    }

    .remember-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1e293b;
    }

    .remember-box {
      width: 15px;
      height: 15px;
      accent-color: #2463ff;
    }

    .forgot-link {
      color: #004cff;
      text-decoration: none;
      font-size: 13px;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 8px;
      background: #2463ff;
      color: #ffffff;
      font-size: 16px;
      font-weight: 900;
      box-shadow: 0 8px 16px rgba(36, 99, 255, 0.25);
    }

    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 24px 0 23px;
    }

    .login-note {
      margin: 0;
      color: #1f354d;
      font-size: 13px;
      line-height: 1.48;
      text-align: center;
      padding: 0 4px;
    }

    footer {
      height: 98px;
      background: #ffffff;
      border-top: 1px solid #d8dee8;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #334155;
      font-size: 14px;
      padding: 18px 16px;
    }

    footer small {
      display: block;
      margin-top: 10px;
      color: #334155;
      font-size: 12px;
    }

    @media (max-width: 520px) {
      .login-page {
        padding-top: 32px;
      }

      .login-card {
        padding: 26px 20px;
      }

      .page-title h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="login-page">
    <div class="mb-4">
      <a href="index.html" class="text-decoration-none fw-bold">Back to Home</a>
    </div>

    <div class="lock-icon">
      <i class="bi bi-lock"></i>
    </div>

    <div class="page-title">
      <h1>Admin Login</h1>
      <p>Access the administrative dashboard</p>
    </div>

    <section class="login-card">
      <form action="admin_Dashboard.html">
        <div class="field-space">
          <label for="username" class="form-label">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter your username" />
        </div>

        <div class="field-space">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" />
        </div>

        <div class="login-options">
          <label class="remember-wrap">
            <input type="checkbox" class="remember-box" />
            <span>Remember me</span>
          </label>
          <a href="index.html" class="forgot-link">Back to portal</a>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="divider"></div>

        <p class="login-note">
          Only authorized barangay staff members can access the admin panel. For assistance, contact the IT administrator.
        </p>
      </form>
    </section>
  </main>

  <footer>
    <div>
      <div>© 2026 Barangay Service Portal. All rights reserved.</div>
      <small>For assistance, contact your local barangay office.</small>
    </div>
  </footer>
</body>
</html>
